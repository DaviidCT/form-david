<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <form class="container-fluid">
        <div class="row">
            <h1>PAYMENT FORM EXAMPLE</h1>
        </div>
            
        <div class="row">
            <div class="alert alert-danger" role="alert">
                Some field are missing.
            </div>
        </div>    
            <!--PRIMERA FILA INPUTS-->
            <div class="row">
                <div class="col-sm-12 col-md-6 col-lg-6">
                    <label for="card">Card#</label>
                    <input type="number" name="card" class="form-control" placeholder="XXXXXXXXXXXXXXXXXXX" aria-label="XXXXXXXXXXXXXXXXXXX" aria-describedby="basic-addon1">
                </div>
                <div class="col-sm-12 col-md-2 col-lg-2">
                    <label for="card">CVC</label>
                    <input type="number" name="CVC" class="form-control" placeholder="0000" aria-label="0000" aria-describedby="basic-addon1">
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <label for="card">Amount</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" aria-label="Amount (to the nearest dollar)">
                      </div>
                </div>
            </div>
            <!--PRIMERA FILA INPUTS-->
            <div class="row">
                <div class="col-sm-12 col-md-6 col-lg-6">
                    <label for="first-name">First name</label>
                    <input type="text" name="first-name" class="form-control" placeholder="" aria-label="" aria-describedby="basic-addon1">

                    <label for="city">City</label>
                    <input type="text" name="city" class="form-control" placeholder="" aria-label="" aria-describedby="basic-addon1">
                    
                    <div class="col-sm-12 col-md-6 col-lg-6">
                        <label for="pay">We accept:</label>
                        <br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                            <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-mastercard"></i></label>

                          </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                            <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-visa"></i></label>
                          </div>

                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                            <label class="form-check-label" for="inlineRadio2"><i class="fa-brands fa-cc-amex"></i></label>
                          </div>

                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option3">
                            <label class="form-check-label" for="inlineRadio3"><i class="fa-brands fa-cc-paypal"></i></label>
                          </div>

                    </div>
                </div>
                <div class="col-sm-12 col-md-6 col-lg-6">
                    <label for="last-name">Last Name</label>
                    <input type="text" name="last-name" class="form-control" placeholder="" aria-label="" aria-describedby="basic-addon1">
                <div class="row">
                    <div class="col-sm-12 col-md-6 col-lg-6">
                        <label for="state">State</label>
                        <select class="form-select" name="state" aria-label="Default select example">
                            <option selected></option>
                            <option value="1">Madrid</option>
                            <option value="2">Barcelona</option>
                            <option value="3">Albacete</option>
                          </select>
                    </div>
                        <div class="col-sm-12 col-md-6 col-lg-6">
                        <label for="postal-code">Postal Code</label>
                        <input type="number" name="postal-code" class="form-control" placeholder="" aria-label="" aria-describedby="basic-addon1">
                    </div>
                </div>
                        <label for="message">Message</label>
                        <textarea class="form-control" name="message" rows="3"></textarea>
                        <div class="form-text">Add any notes here.</div>
                        </div>
                </div>
            </div>
        <div class="row">
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button class="btn btn-secondary me-md-2" type="button">Cancel</button>
                <button class="btn btn-primary" type="button">Send</button>
              </div>
        </div>
    </form>
</body>
</html>
